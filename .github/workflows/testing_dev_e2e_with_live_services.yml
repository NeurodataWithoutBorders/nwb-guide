name: End-to-end tests with live services
on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true
      DANDI_SANDBOX_API_KEY:
        required: true

jobs:

  run:
    # Will read on PR dashboard as 'Deploy / E2ELiveServices / {os}'
    # Action dashboard identified by 'End-to-end tests with live services'
    # Requirement settings identified as 'E2ELiveServices / {os}'
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest

          - os: macos-latest  # Mac arm64 runner

          - os: macos-15-intel  # Mac x64 runner

          - os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Add the virtual environment to PATH
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "$GITHUB_WORKSPACE\\.venv\\Scripts" >> "$GITHUB_PATH"
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          fi
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install GUIDE
        run: npm ci --verbose

      - name: Manually remove matplotlib
        run: uv pip uninstall matplotlib || true

      - name: Create env file
        run: |
          touch .env
          echo DANDI_SANDBOX_API_KEY=${{ secrets.DANDI_SANDBOX_API_KEY }} >> .env

      # The macOS x64 runner intermittently crashes Chromium/Electron subprocesses (GPU and
      # network-service), which fails the E2E run. Retry only on that runner.
      - if: matrix.os == 'macos-15-intel'
        name: Run tests (retried on the flaky x64 runner)
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 25
          max_attempts: 5
          command: npm run coverage:tutorial

      - if: matrix.os == 'macos-latest' || matrix.os == 'windows-latest'
        name: Run tests
        run: npm run coverage:tutorial

      - if: matrix.os == 'ubuntu-latest'
        name: Run tests with xvfb
        run: |
          # Adjust Chrome sandbox (used by Puppeteer) owner and permissions to bypass Ubuntu 24.04's
          # new restrictions for AppImage apps. https://github.com/electron/electron/issues/42510
          sudo chown root ./node_modules/electron/dist/chrome-sandbox
          sudo chmod 4755 ./node_modules/electron/dist/chrome-sandbox
          xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" -- npm run coverage:tutorial

      - name: Archive E2E Test Screenshots
        uses: actions/upload-artifact@v7
        with:
          name: test-screenshots-${{ matrix.os }}
          path: docs/assets/tutorials
          retention-days: 1
          overwrite: true

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          fail_ci_if_error: true
