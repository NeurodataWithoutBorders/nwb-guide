name: Dev tests
on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true

jobs:

  run:
    # Will read on PR dashboard as 'Deploy / DevTests / {os}'
    # Action dashboard identified by 'Dev tests'
    # Requirement settings identified as 'DevTests / {os}'
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest

          - os: macos-latest  # Mac arm64 runner

          - os: macos-15-intel  # Mac x64 runner

          - os: windows-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --locked

      - name: Add the virtual environment to PATH
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "$GITHUB_WORKSPACE\\.venv\\Scripts" >> "$GITHUB_PATH"
          else
            echo "$GITHUB_WORKSPACE/.venv/bin" >> "$GITHUB_PATH"
          fi
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"

      - name: Use Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install GUIDE
        run: npm ci --verbose

      - name: Manually remove matplotlib
        run: uv pip uninstall matplotlib || true

      - if: matrix.os != 'ubuntu-latest'
        name: Run tests
        run: npm run test:coverage

      - if: matrix.os == 'ubuntu-latest'
        name: Run tests with xvfb
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x960x24" -- npm run test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          fail_ci_if_error: true
