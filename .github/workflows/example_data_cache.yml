name: Example data cache
on:
  workflow_call:
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      S3_GIN_BUCKET:
        required: true

jobs:

  run:
    # Will read on PR dashboard as 'Deploy / ExampleDataCache / {os}'
    # Action dashboard identified by 'Deploy'
    # Requirement settings identified as 'ExampleDataCache / {os}'
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-15-intel]

    steps:

      - name: Get ephy_testing_data current head hash
        id: ephys
        run: |
          HASH=$(git ls-remote https://gin.g-node.org/NeuralEnsemble/ephy_testing_data.git HEAD | cut -f1)
          if [ -z "$HASH" ]; then echo "Failed to fetch ephy_testing_data hash" && exit 1; fi
          echo "HASH_EPHY_DATASET=$HASH" >> $GITHUB_OUTPUT
      - name: Get cached ephys example data - ${{ steps.ephys.outputs.HASH_EPHY_DATASET }}
        uses: actions/cache@v5
        id: cache-ephys-datasets
        with:
          path: ./ephy_testing_data
          key: ephys-datasets-v2-${{ matrix.os }}-${{ steps.ephys.outputs.HASH_EPHY_DATASET }}
      - name: Get ophys_testing_data current head hash
        id: ophys
        run: |
          HASH=$(git ls-remote https://gin.g-node.org/CatalystNeuro/ophys_testing_data.git HEAD | cut -f1)
          if [ -z "$HASH" ]; then echo "Failed to fetch ophys_testing_data hash" && exit 1; fi
          echo "HASH_OPHYS_DATASET=$HASH" >> $GITHUB_OUTPUT
      - name: Get cached ophys example data - ${{ steps.ophys.outputs.HASH_OPHYS_DATASET }}
        uses: actions/cache@v5
        id: cache-ophys-datasets
        with:
          path: ./ophys_testing_data
          key: ophys-datasets-${{ matrix.os }}-${{ steps.ophys.outputs.HASH_OPHYS_DATASET }}
      - name: Get behavior_testing_data current head hash
        id: behavior
        run: |
          HASH=$(git ls-remote https://gin.g-node.org/CatalystNeuro/behavior_testing_data.git HEAD | cut -f1)
          if [ -z "$HASH" ]; then echo "Failed to fetch behavior_testing_data hash" && exit 1; fi
          echo "HASH_BEHAVIOR_DATASET=$HASH" >> $GITHUB_OUTPUT
      - name: Get cached behavior example data - ${{ steps.behavior.outputs.HASH_BEHAVIOR_DATASET }}
        uses: actions/cache@v5
        id: cache-behavior-datasets
        with:
          path: ./behavior_testing_data
          key: behavior-datasets-${{ matrix.os }}-${{ steps.behavior.outputs.HASH_BEHAVIOR_DATASET }}

      - if: steps.cache-ephys-datasets.outputs.cache-hit != 'true' || steps.cache-ophys-datasets.outputs.cache-hit != 'true' || steps.cache-behavior-datasets.outputs.cache-hit != 'true'
        name: Install and configure AWS CLI
        run: |
          pip install awscli
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}

      - if: steps.cache-ephys-datasets.outputs.cache-hit != 'true'
        name: Download ephys dataset from S3
        run: |
          aws s3 cp --region=us-east-2 ${{ secrets.S3_GIN_BUCKET }}/ephy_testing_data ./ephy_testing_data --recursive
      - if: steps.cache-ophys-datasets.outputs.cache-hit != 'true'
        name: Download ophys dataset from S3
        run: |
          aws s3 cp --region=us-east-2 ${{ secrets.S3_GIN_BUCKET }}/ophys_testing_data ./ophys_testing_data --recursive
      - if: steps.cache-behavior-datasets.outputs.cache-hit != 'true'
        name: Download behavior dataset from S3
        run: |
          aws s3 cp --region=us-east-2 ${{ secrets.S3_GIN_BUCKET }}/behavior_testing_data ./behavior_testing_data --recursive

      # Tutorial Phy data (pre-generated, avoids slow PCA fitting; SpikeGLX is generated locally)
      - name: Cache tutorial Phy data
        uses: actions/cache@v4
        id: cache-tutorial-phy
        with:
          path: ./tutorial_phy_data
          key: tutorial-phy-data-v1-${{ matrix.os }}

      - if: steps.cache-tutorial-phy.outputs.cache-hit != 'true'
        name: Download tutorial Phy data
        run: |
          curl -L -o tutorial_phy_data.tar.gz https://github.com/NeurodataWithoutBorders/nwb-guide/releases/download/tutorial-test-data-v1/tutorial_phy_data.tar.gz
          mkdir -p tutorial_phy_data
          tar xzf tutorial_phy_data.tar.gz -C tutorial_phy_data
          rm tutorial_phy_data.tar.gz

      # Tutorial Phy data (pre-generated, avoids slow PCA fitting; SpikeGLX is generated locally)
      - name: Cache tutorial Phy data
        uses: actions/cache@v4
        id: cache-tutorial-phy
        with:
          path: ./tutorial_phy_data
          key: tutorial-phy-data-v1-${{ matrix.os }}

      - if: steps.cache-tutorial-phy.outputs.cache-hit != 'true'
        name: Download tutorial Phy data
        run: |
          curl -L -o tutorial_phy_data.tar.gz https://github.com/NeurodataWithoutBorders/nwb-guide/releases/download/tutorial-test-data-v1/tutorial_phy_data.tar.gz
          mkdir -p tutorial_phy_data
          tar xzf tutorial_phy_data.tar.gz -C tutorial_phy_data
          rm tutorial_phy_data.tar.gz
